name: hely_tv
description: A modern sports streaming app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  webview_flutter: ^4.5.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^5.0.2
  device_info_plus: ^9.1.1
  google_fonts: ^6.1.0
  intl: ^0.19.0
  url_launcher: ^6.2.5
  wakelock_plus: ^1.2.8
  flutter_displaymode: ^0.6.0
  open_filex: ^4.4.0
  path_provider: ^2.1.2
  package_info_plus: ^8.0.0
  installed_apps: ^1.0.2
  simple_pip_mode: ^1.1.0
  firebase_core: ^2.32.0
  firebase_analytics: ^10.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  rename: ^3.0.2
  change_app_package_name: ^1.5.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/